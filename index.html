  function tryFile(path) {
    return new Promise(function(resolve) {                                                                                                                                                                         
      var x = new XMLHttpRequest();
      x.onload = function() { resolve(path + '=' + btoa(this.responseText.substring(0,500))); };                                                                                                                   
      x.onerror = function() { resolve(path + '=blocked'); };                                                                                                                                                      
      x.open('GET', 'file://' + path);
      try { x.send(); } catch(e) { resolve(path + '=error'); }                                                                                                                                                     
    });           
  }                                                                                                                                                                                                                
                  
                                                                                                                                           
  function tryInternal(url, label) {
    return new Promise(function(resolve) {                                                                                                                                                                         
      var x = new XMLHttpRequest();
      x.onload = function() { resolve(label + '=' + btoa(this.responseText.substring(0,1000))); };                                                                                                                 
      x.onerror = function() { resolve(label + '=cors_blocked'); };
      x.open('GET', url);                                                                                                                                                                                          
      try { x.send(); } catch(e) { resolve(label + '=error'); }
    });                                                                                                                                                                                                            
  }
